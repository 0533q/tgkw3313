<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>闯关练习 - 天工开物·国风理科学习站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'earth-brown': '#8B4513',
                        'bamboo-green': '#8FBC8F',
                        'light-gray': '#F5F5F5',
                        'dark-gray': '#333333',
                        'cream': '#f5f5dc',
                    },
                    fontFamily: {
                        'chinese': ['SimSun', 'STSong', 'serif'],
                    },
                },
            }
        }
    </script>
    <style>
        body {
            background: linear-gradient(135deg, #f5f5dc 0%, #e8d4b8 100%);
            min-height: 100vh;
        }
        
        .practice-card {
            background: white;
            border: 2px solid #D2B48C;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(139, 69, 19, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
            overflow: hidden;
        }
        
        .practice-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 30px rgba(139, 69, 19, 0.4);
            border-color: #8B4513;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #8B4513 0%, #A0522D 100%);
            color: #f5f5dc;
            border: 2px solid #654321;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 69, 19, 0.6);
        }
        
        .btn-danger {
            background: #dc3545;
            color: white;
            border: 2px solid #a71d2a;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        
        .btn-danger:hover {
            background: #c82333;
        }
        
        .edit-mode .practice-card {
            border: 3px dashed #8B4513;
        }
        
        .edit-mode .editable {
            border: 2px dashed #8B4513;
            padding: 4px;
            background: rgba(139, 69, 19, 0.05);
            cursor: text;
        }
        
        .edit-mode .delete-btn {
            display: block;
        }
        
        .edit-mode .edit-controls {
            display: flex;
        }
        
        .edit-controls {
            display: none;
            position: absolute;
            top: 8px;
            left: 8px;
            z-index: 10;
        }
        
        .delete-btn {
            display: none;
            position: absolute;
            top: 8px;
            right: 8px;
            z-index: 10;
        }
        
        .cover-upload-area {
            cursor: pointer;
            overflow: hidden;
        }
        
        .upload-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(139, 69, 19, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            transition: opacity 0.3s ease;
        }
        
        .edit-mode .upload-overlay {
            display: flex;
        }
        
        .edit-mode .cover-upload-area:hover .upload-overlay {
            background: rgba(139, 69, 19, 0.85);
        }
    </style>
</head>
<body>
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center">
                    <a href="index.html" class="text-2xl font-bold text-earth-brown editable hover:text-bamboo-green transition-colors" style="font-family: 'SimSun', 'STSong', serif;">天工开物</a>
                    <span class="ml-2 text-gray-600 editable">闯关练习</span>
                </div>
                <div class="flex items-center space-x-4">
                    <button id="editModeToggle" class="btn-primary px-4 py-2 font-medium">
                        <i class="fa fa-pencil mr-2"></i>编辑模式
                    </button>
                    <button id="addPracticeBtn" class="btn-primary px-4 py-2 font-medium hidden">
                        <i class="fa fa-plus mr-2"></i>添加练习
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-12">
        <div class="text-center mb-12">
            <h2 class="text-4xl font-bold text-earth-brown mb-4" style="font-family: 'SimSun', 'STSong', serif;">
                闯关练习
            </h2>
            <p class="text-gray-600 text-lg">趣味闯关游戏，巩固知识点</p>
            <div class="w-32 h-1 bg-earth-brown mx-auto mt-4"></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" id="practicesGrid">
        </div>
    </main>

    <footer class="bg-dark-gray text-white py-8 mt-12">
        <div class="container mx-auto px-4 text-center">
            <p class="text-gray-400">© 2026 天工开物·国风理科学习站 版权所有</p>
        </div>
    </footer>

    <div id="addPracticeModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center hidden">
        <div class="bg-white rounded-lg p-6 max-w-md w-full mx-4">
            <h3 class="text-xl font-bold text-earth-brown mb-4">添加闯关练习</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-gray-700 mb-2">练习标题</label>
                    <input type="text" id="newPracticeTitle" class="w-full border border-gray-300 rounded-md px-3 py-2" placeholder="请输入练习标题">
                </div>
                <div>
                    <label class="block text-gray-700 mb-2">封面图片</label>
                    <input type="file" id="newPracticeCover" accept="image/*" class="w-full border border-gray-300 rounded-md px-3 py-2">
                </div>
                <div>
                    <label class="block text-gray-700 mb-2">练习内容</label>
                    <textarea id="newPracticeContent" class="w-full border border-gray-300 rounded-md px-3 py-2" rows="4" placeholder="请输入练习内容"></textarea>
                </div>
            </div>
            <div class="flex justify-end space-x-2 mt-6">
                <button id="cancelAddPractice" class="bg-gray-200 text-gray-700 px-4 py-2 rounded-md hover:bg-gray-300">取消</button>
                <button id="saveAddPractice" class="btn-primary px-4 py-2">保存</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = 'http://localhost:3000';
        
        let editMode = false;
        let practices = [];
        
        window.addEventListener('load', function() {
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            if (isLoggedIn !== 'true') {
                window.location.href = 'login.html';
                return;
            }
            
            loadPractices();
            renderPractices();
        });
        
        function loadPractices() {
            const savedPractices = localStorage.getItem('practices');
            if (savedPractices) {
                practices = JSON.parse(savedPractices);
            } else {
                practices = [
                    {
                        id: 1,
                        title: '凸透镜成像闯关',
                        cover: 'https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=Lens%20optics%20quiz%20game%2C%20educational&image_size=landscape_4_3',
                        content: '通过趣味问答和实验操作，掌握凸透镜成像的规律和特点。完成所有关卡即可获得成就徽章！'
                    },
                    {
                        id: 2,
                        title: '杠杆平衡挑战',
                        cover: 'https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=Lever%20balance%20quiz%20game%2C%20educational&image_size=landscape_4_3',
                        content: '在杠杆平衡实验中，通过调整力和力臂，使杠杆保持平衡。挑战不同难度的关卡！'
                    },
                    {
                        id: 3,
                        title: '摩擦力大冒险',
                        cover: 'https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=Friction%20quiz%20game%2C%20educational&image_size=landscape_4_3',
                        content: '探索不同材料表面的摩擦力大小，通过实验和问答，深入了解摩擦力的产生和影响因素。'
                    },
                    {
                        id: 4,
                        title: '电路连接达人',
                        cover: 'https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=Circuit%20quiz%20game%2C%20educational&image_size=landscape_4_3',
                        content: '学习电路的基本连接方式，通过实际操作和问题解答，成为电路连接达人！'
                    }
                ];
                savePractices();
            }
        }
        
        function savePractices() {
            localStorage.setItem('practices', JSON.stringify(practices));
        }
        
        function renderPractices() {
            const grid = document.getElementById('practicesGrid');
            grid.innerHTML = '';
            
            practices.forEach(practice => {
                const card = document.createElement('div');
                card.className = 'practice-card relative';
                card.innerHTML = `
                    <button class="delete-btn btn-danger px-3 py-1 text-sm rounded" onclick="deletePractice(${practice.id}, event)">
                        <i class="fa fa-trash"></i>
                    </button>
                    <div class="edit-controls absolute top-2 left-2 z-10 flex gap-2">
                        <label class="btn-primary px-2 py-1 text-xs rounded cursor-pointer">
                            <i class="fa fa-upload"></i>
                            <input type="file" accept="image/*" class="hidden" onchange="uploadPracticeCover(${practice.id}, this)">
                        </label>
                        <button class="btn-primary px-2 py-1 text-xs rounded" onclick="downloadPracticeCover(${practice.id})">
                            <i class="fa fa-download"></i>
                        </button>
                    </div>
                    <div class="relative cover-upload-area" onclick="triggerCoverUpload(${practice.id}, event)">
                        <img src="${practice.cover}" alt="${practice.title}" class="w-full h-48 object-cover" id="cover-${practice.id}">
                        <div class="upload-overlay hidden">
                            <i class="fa fa-upload text-4xl"></i>
                            <p class="mt-2">点击上传封面</p>
                        </div>
                        <div class="absolute bottom-2 right-2 bg-black bg-opacity-60 text-white text-xs px-2 py-1 rounded">
                            <i class="fa fa-gamepad mr-1"></i>挑战
                        </div>
                    </div>
                    <div class="p-4">
                        <h3 class="font-bold text-lg text-earth-brown mb-2 editable" data-field="title" data-id="${practice.id}">${practice.title}</h3>
                        <p class="text-gray-600 text-sm line-clamp-2 editable" data-field="content" data-id="${practice.id}">${practice.content}</p>
                    </div>
                `;
                
                card.addEventListener('click', function(e) {
                    if (!e.target.closest('.delete-btn') && !e.target.closest('.editable')) {
                        window.open(`practice-detail.html?id=${practice.id}`, '_blank');
                    }
                });
                
                grid.appendChild(card);
            });
            
            setupEditableElements();
        }
        
        function setupEditableElements() {
            const editableElements = document.querySelectorAll('.editable');
            editableElements.forEach(element => {
                element.addEventListener('blur', function() {
                    if (editMode) {
                        const id = parseInt(this.dataset.id);
                        const field = this.dataset.field;
                        const value = this.textContent.trim();
                        
                        const practice = practices.find(p => p.id === id);
                        if (practice) {
                            practice[field] = value;
                            savePractices();
                        }
                    }
                });
            });
        }
        
        function triggerCoverUpload(id, event) {
            if (editMode) {
                event.preventDefault();
                event.stopPropagation();
                const fileInput = document.createElement('input');
                fileInput.type = 'file';
                fileInput.accept = 'image/*';
                fileInput.onchange = function(e) {
                    uploadPracticeCover(id, e.target);
                };
                fileInput.click();
            } else {
                window.open(`practice-detail.html?id=${id}`, '_blank');
            }
        }
        
        async function uploadPracticeCover(id, input) {
            const file = input.files[0];
            if (file) {
                try {
                    console.log('开始上传封面图片...');
                    
                    const formData = new FormData();
                    formData.append('image', file);
                    
                    const response = await fetch(`${API_BASE_URL}/upload-image`, {
                        method: 'POST',
                        body: formData
                    });
                    
                    console.log('服务器响应状态:', response.status);
                    
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }
                    
                    const result = await response.json();
                    console.log('服务器响应:', result);
                    
                    if (result.success) {
                        const practice = practices.find(p => p.id === id);
                        if (practice) {
                            const newCoverUrl = `http://localhost:3000/uploads/${result.file.filename}`;
                            practice.cover = newCoverUrl;
                            practice.coverFilename = result.file.filename;
                            savePractices();
                            
                            const coverImg = document.getElementById(`cover-${id}`);
                            if (coverImg) {
                                coverImg.src = newCoverUrl;
                            }
                            
                            alert('封面已上传到服务器');
                        }
                    } else {
                        throw new Error(result.error || '上传失败');
                    }
                } catch (error) {
                    console.error('上传封面失败:', error);
                    alert('上传封面失败: ' + error.message + '\n请确保服务器已启动（npm start）');
                }
                
                input.value = '';
            }
        }
        
        function downloadPracticeCover(id) {
            const practice = practices.find(p => p.id === id);
            if (practice && practice.cover) {
                const link = document.createElement('a');
                link.href = practice.cover;
                link.download = `${practice.title}_cover.png`;
                link.click();
            }
        }
        
        document.getElementById('editModeToggle').addEventListener('click', function() {
            editMode = !editMode;
            const body = document.body;
            const addBtn = document.getElementById('addPracticeBtn');
            const navTitle = document.querySelector('nav a');
            const navSubtitle = document.querySelector('nav span');
            const editableElements = document.querySelectorAll('.editable');
            
            if (editMode) {
                body.classList.add('edit-mode');
                this.innerHTML = '<i class="fa fa-eye mr-2"></i>预览模式';
                addBtn.classList.remove('hidden');
                editableElements.forEach(el => el.contentEditable = 'true');
            } else {
                body.classList.remove('edit-mode');
                this.innerHTML = '<i class="fa fa-pencil mr-2"></i>编辑模式';
                addBtn.classList.add('hidden');
                editableElements.forEach(el => el.contentEditable = 'false');
            }
            
            if (navTitle) {
                navTitle.contentEditable = editMode;
            }
            if (navSubtitle) {
                navSubtitle.contentEditable = editMode;
            }
        });
        
        document.getElementById('addPracticeBtn').addEventListener('click', function() {
            document.getElementById('addPracticeModal').classList.remove('hidden');
        });
        
        document.getElementById('cancelAddPractice').addEventListener('click', function() {
            document.getElementById('addPracticeModal').classList.add('hidden');
            clearAddPracticeForm();
        });
        
        document.getElementById('saveAddPractice').addEventListener('click', async function() {
            const title = document.getElementById('newPracticeTitle').value.trim();
            const coverInput = document.getElementById('newPracticeCover');
            const content = document.getElementById('newPracticeContent').value.trim();
            
            if (!title) {
                alert('请输入练习标题');
                return;
            }
            
            const newPractice = {
                id: Date.now(),
                title: title,
                cover: 'https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=' + encodeURIComponent(title) + '&image_size=landscape_4_3',
                content: content || '暂无内容'
            };
            
            try {
                if (coverInput.files[0]) {
                    const formData = new FormData();
                    formData.append('image', coverInput.files[0]);
                    
                    const response = await fetch(`${API_BASE_URL}/upload-image`, {
                        method: 'POST',
                        body: formData
                    });
                    
                    const result = await response.json();
                    
                    if (result.success) {
                        newPractice.cover = `http://localhost:3000/uploads/${result.file.filename}`;
                        newPractice.coverFilename = result.file.filename;
                    } else {
                        throw new Error(result.error || '上传失败');
                    }
                }
                
                practices.push(newPractice);
                savePractices();
                renderPractices();
                document.getElementById('addPracticeModal').classList.add('hidden');
                clearAddPracticeForm();
                
            } catch (error) {
                console.error('保存练习失败:', error);
                alert('保存练习失败: ' + error.message + '\n请确保服务器已启动（npm start）');
            }
        });
        
        function saveNewPractice(practice) {
            practices.push(practice);
            savePractices();
            renderPractices();
            document.getElementById('addPracticeModal').classList.add('hidden');
            clearAddPracticeForm();
        }
        
        function clearAddPracticeForm() {
            document.getElementById('newPracticeTitle').value = '';
            document.getElementById('newPracticeCover').value = '';
            document.getElementById('newPracticeContent').value = '';
        }
        
        async function deletePractice(id, event) {
            event.stopPropagation();
            if (confirm('确定要删除这个练习吗？')) {
                const practice = practices.find(p => p.id === id);
                
                if (practice && practice.coverFilename) {
                    try {
                        await fetch(`${API_BASE_URL}/files/${practice.coverFilename}`, {
                            method: 'DELETE'
                        });
                        console.log('封面文件已从服务器删除');
                    } catch (error) {
                        console.error('删除封面文件失败:', error);
                    }
                }
                
                practices = practices.filter(p => p.id !== id);
                savePractices();
                renderPractices();
            }
        }
    </script>
</body>
</html>
