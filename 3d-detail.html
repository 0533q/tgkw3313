<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D模型详情 - 天工开物·国风理科学习站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'earth-brown': '#8B4513',
                        'bamboo-green': '#8FBC8F',
                        'light-gray': '#F5F5F5',
                        'dark-gray': '#333333',
                        'cream': '#f5f5dc',
                    },
                    fontFamily: {
                        'chinese': ['SimSun', 'STSong', 'serif'],
                    },
                },
            }
        }
    </script>
    <style>
        body {
            background: linear-gradient(135deg, #f5f5dc 0%, #e8d4b8 100%);
            min-height: 100vh;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #8B4513 0%, #A0522D 100%);
            color: #f5f5dc;
            border: 2px solid #654321;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 69, 19, 0.6);
        }
        
        .btn-danger {
            background: #dc3545;
            color: white;
            border: 2px solid #a71d2a;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        
        .btn-danger:hover {
            background: #c82333;
        }
        
        .edit-mode .editable {
            border: 2px dashed #8B4513;
            padding: 8px;
            background: rgba(139, 69, 19, 0.05);
        }
        
        .edit-mode .edit-controls {
            display: block;
        }
        
        .edit-controls {
            display: none;
        }
        
        #canvas-container {
            background: white;
            border: 2px solid #D2B48C;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .content-card {
            background: white;
            border: 2px solid #D2B48C;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(139, 69, 19, 0.2);
        }
        
        .upload-overlay {
            position: absolute;
            top: 10px;
            right: 10px;
            z-index: 100;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #f3f3f3f;
            border-top: 4px solid #8B4513;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center">
                    <a href="index.html" class="text-2xl font-bold text-earth-brown hover:text-bamboo-green transition-colors" style="font-family: 'SimSun', 'STSong', serif;">天工开物</a>
                    <span class="ml-2 text-gray-600">3D模型详情</span>
                </div>
                <div class="flex items-center space-x-4">
                    <button id="editModeToggle" class="btn-primary px-4 py-2 font-medium">
                        <i class="fa fa-pencil mr-2"></i>编辑模式
                    </button>
                    <a href="3d-lab.html" class="text-earth-brown hover:text-bamboo-green transition-colors">
                        <i class="fa fa-arrow-left mr-1"></i>返回
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        <div class="max-w-4xl mx-auto">
            <div class="mb-6">
                <h1 class="text-3xl font-bold text-earth-brown mb-2 editable" id="modelTitle"></h1>
                <div class="edit-controls">
                    <input type="text" id="editTitle" class="w-full border border-gray-300 rounded-md px-3 py-2 mb-2" placeholder="编辑标题">
                    <button onclick="saveTitle()" class="btn-primary px-4 py-2 text-sm">保存标题</button>
                </div>
            </div>

            <div id="canvas-container" class="mb-6 relative" style="height: 500px;">
                <div class="upload-overlay edit-controls">
                    <label class="btn-primary px-4 py-2 text-sm cursor-pointer">
                        <i class="fa fa-upload mr-1"></i>上传STL模型
                        <input type="file" id="modelUpload" accept=".stl" class="hidden">
                    </label>
                </div>
                <div id="loading" class="absolute inset-0 flex items-center justify-center bg-white bg-opacity-90 hidden">
                    <div class="text-center">
                        <div class="spinner mb-4"></div>
                        <div class="text-earth-brown">加载中...</div>
                    </div>
                </div>
            </div>

            <div class="content-card p-6 mb-6">
                <h2 class="text-2xl font-bold text-earth-brown mb-4">文字说明</h2>
                <div class="editable" id="modelDescription"></div>
                <div class="edit-controls mt-4">
                    <textarea id="editDescription" class="w-full border border-gray-300 rounded-md px-3 py-2" rows="6" placeholder="编辑文字说明"></textarea>
                    <button onclick="saveDescription()" class="btn-primary px-4 py-2 mt-2">保存说明</button>
                </div>
            </div>

            <div class="content-card p-6">
                <h2 class="text-2xl font-bold text-earth-brown mb-4">相关学习</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <button onclick="jumpToCourse()" class="btn-primary py-4 px-6 text-center">
                        <i class="fa fa-video-camera text-2xl mb-2 block"></i>
                        <span class="font-medium">微课学习</span>
                    </button>
                    <button onclick="jumpToPractice()" class="btn-primary py-4 px-6 text-center">
                        <i class="fa fa-gamepad text-2xl mb-2 block"></i>
                        <span class="font-medium">闯关练习</span>
                    </button>
                    <button onclick="jumpToStory()" class="btn-primary py-4 px-6 text-center">
                        <i class="fa fa-book text-2xl mb-2 block"></i>
                        <span class="font-medium">故事集锦</span>
                    </button>
                </div>
            </div>

            <div class="edit-controls mt-6">
                <button onclick="deleteModel()" class="btn-danger px-6 py-3 w-full">
                    <i class="fa fa-trash mr-2"></i>删除此模型
                </button>
            </div>
        </div>
    </main>

    <footer class="bg-dark-gray text-white py-8 mt-12">
        <div class="container mx-auto px-4 text-center">
            <p class="text-gray-400">© 2026 天工开物·国风理科学习站 版权所有</p>
        </div>
    </footer>

    <script>
        const API_BASE_URL = 'http://localhost:3000';
        
        let editMode = false;
        let currentModel = null;
        let modelId = null;
        let scene, camera, renderer, controls;
        let threeModel = null;
        
        window.addEventListener('load', function() {
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            if (isLoggedIn !== 'true') {
                window.location.href = 'login.html';
                return;
            }
            
            modelId = getModelId();
            loadModelData();
            init3DScene();
        });
        
        function getModelId() {
            const urlParams = new URLSearchParams(window.location.search);
            return parseInt(urlParams.get('id'));
        }
        
        function getModelSequence() {
            const models = JSON.parse(localStorage.getItem('models') || '[]');
            return models.findIndex(m => m.id === modelId);
        }
        
        function loadModelData() {
            const models = JSON.parse(localStorage.getItem('models') || '[]');
            currentModel = models.find(m => m.id === modelId);
            
            if (!currentModel) {
                alert('模型不存在');
                window.location.href = '3d-lab.html';
                return;
            }
            
            document.getElementById('modelTitle').textContent = currentModel.title;
            document.getElementById('editTitle').value = currentModel.title;
            document.getElementById('modelDescription').innerHTML = currentModel.description.replace(/\n/g, '<br>');
            document.getElementById('editDescription').value = currentModel.description;
        }
        
        function init3DScene() {
            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xf5f5dc);
            
            camera = new THREE.PerspectiveCamera(
                75,
                container.clientWidth / container.clientHeight,
                0.1,
                1000
            );
            camera.position.set(5, 5, 5);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);
            
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(10, 10, 10);
            directionalLight.castShadow = true;
            scene.add(directionalLight);
            
            const pointLight = new THREE.PointLight(0xffffff, 0.5);
            pointLight.position.set(-10, 10, -10);
            scene.add(pointLight);
            
            const gridHelper = new THREE.GridHelper(20, 20, 0x8B4513, 0xD2B48C);
            scene.add(gridHelper);
            
            window.addEventListener('resize', onWindowResize);
            
            if (currentModel.serverFilename) {
                loadSTLFromServer(currentModel.serverFilename);
            } else if (currentModel.model) {
                loadSTLModel(currentModel.model);
            }
            
            animate();
        }
        
        async function loadSTLFromServer(filename) {
            const loading = document.getElementById('loading');
            const loadingText = loading.querySelector('.text-earth-brown');
            loading.classList.remove('hidden');
            loadingText.textContent = '从服务器加载模型...';
            
            try {
                const response = await fetch(`${API_BASE_URL}/uploads/${filename}`);
                if (!response.ok) {
                    throw new Error('文件加载失败');
                }
                
                const data = await response.arrayBuffer();
                loadSTLModel(data);
            } catch (error) {
                console.error('从服务器加载模型失败:', error);
                loadingText.textContent = '服务器加载失败，使用本地数据';
                setTimeout(() => {
                    if (currentModel.model) {
                        loadSTLModel(currentModel.model);
                    } else {
                        loading.classList.add('hidden');
                    }
                }, 1500);
            }
        }
        
        function onWindowResize() {
            const container = document.getElementById('canvas-container');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        
        function loadSTLModel(data) {
            const loading = document.getElementById('loading');
            const loadingText = loading.querySelector('.text-earth-brown');
            loading.classList.remove('hidden');
            loadingText.textContent = '加载中...';
            
            try {
                const loader = new THREE.STLLoader();
                const geometry = loader.parse(data);
                
                if (threeModel) {
                    scene.remove(threeModel);
                    threeModel.geometry.dispose();
                    threeModel.material.dispose();
                }
                
                const material = new THREE.MeshPhongMaterial({
                    color: 0x8B4513,
                    specular: 0x3d2314,
                    shininess: 30
                });
                
                threeModel = new THREE.Mesh(geometry, material);
                threeModel.castShadow = true;
                threeModel.receiveShadow = true;
                
                geometry.computeBoundingBox();
                const boundingBox = geometry.boundingBox;
                const center = new THREE.Vector3();
                boundingBox.getCenter(center);
                
                threeModel.position.sub(center);
                
                const size = new THREE.Vector3();
                boundingBox.getSize(size);
                const maxDimension = Math.max(size.x, size.y, size.z);
                
                const distance = maxDimension * 2;
                camera.position.set(distance, distance, distance);
                camera.lookAt(0, 0, 0);
                controls.target.set(0, 0, 0);
                controls.update();
                
                scene.add(threeModel);
                
                loading.classList.add('hidden');
            } catch (error) {
                console.error('STL加载错误:', error);
                loadingText.textContent = '加载失败，请重试';
                setTimeout(() => {
                    loading.classList.add('hidden');
                }, 2000);
            }
        }
        
        function loadSTLFile(file) {
            const reader = new FileReader();
            
            reader.onload = function(event) {
                const contents = event.target.result;
                
                const loading = document.getElementById('loading');
                const loadingText = loading.querySelector('.text-earth-brown');
                loading.classList.remove('hidden');
                loadingText.textContent = '加载中...';
                
                try {
                    const loader = new THREE.STLLoader();
                    const geometry = loader.parse(contents);
                    
                    if (threeModel) {
                        scene.remove(threeModel);
                        threeModel.geometry.dispose();
                        threeModel.material.dispose();
                    }
                    
                    const material = new THREE.MeshPhongMaterial({
                        color: 0x8B4513,
                        specular: 0x3d2314,
                        shininess: 30
                    });
                    
                    threeModel = new THREE.Mesh(geometry, material);
                    threeModel.castShadow = true;
                    threeModel.receiveShadow = true;
                    
                    geometry.computeBoundingBox();
                    const boundingBox = geometry.boundingBox;
                    const center = new THREE.Vector3();
                    boundingBox.getCenter(center);
                    
                    threeModel.position.sub(center);
                    
                    const size = new THREE.Vector3();
                    boundingBox.getSize(size);
                    const maxDimension = Math.max(size.x, size.y, size.z);
                    
                    const distance = maxDimension * 2;
                    camera.position.set(distance, distance, distance);
                    camera.lookAt(0, 0, 0);
                    controls.target.set(0, 0, 0);
                    controls.update();
                    
                    scene.add(threeModel);
                    
                    loading.classList.add('hidden');
                } catch (error) {
                    console.error('STL加载错误:', error);
                    loadingText.textContent = '加载失败，请重试';
                    setTimeout(() => {
                        loading.classList.add('hidden');
                    }, 2000);
                }
            };
            
            reader.readAsArrayBuffer(file);
        }
        
        document.getElementById('editModeToggle').addEventListener('click', function() {
            editMode = !editMode;
            const body = document.body;
            
            if (editMode) {
                body.classList.add('edit-mode');
                this.innerHTML = '<i class="fa fa-eye mr-2"></i>预览模式';
            } else {
                body.classList.remove('edit-mode');
                this.innerHTML = '<i class="fa fa-pencil mr-2"></i>编辑模式';
            }
        });
        
        document.getElementById('modelUpload').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (file) {
                const maxSize = 50 * 1024 * 1024;
                if (file.size > maxSize) {
                    alert('文件过大（最大50MB）');
                    return;
                }
                
                const loading = document.getElementById('loading');
                const loadingText = loading.querySelector('.text-earth-brown');
                loading.classList.remove('hidden');
                loadingText.textContent = '正在上传模型...';
                
                try {
                    const formData = new FormData();
                    formData.append('file', file);
                    
                    console.log('开始上传文件到服务器...');
                    
                    const response = await fetch(`${API_BASE_URL}/upload`, {
                        method: 'POST',
                        body: formData
                    });
                    
                    console.log('服务器响应状态:', response.status);
                    
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                    }
                    
                    const result = await response.json();
                    console.log('服务器响应:', result);
                    
                    if (result.success) {
                        currentModel.serverFilename = result.file.filename;
                        currentModel.modelSize = result.file.size;
                        currentModel.modelName = result.file.originalName;
                        currentModel.uploadTime = result.file.uploadTime;
                        
                        saveModelData();
                        loadSTLFile(file);
                        
                        alert('模型已上传到服务器，下次打开将自动加载');
                    } else {
                        throw new Error(result.error || '上传失败');
                    }
                } catch (error) {
                    console.error('上传模型失败:', error);
                    alert('上传模型失败: ' + error.message + '\n请确保服务器已启动（npm start）');
                    loading.classList.add('hidden');
                }
            }
        });
        
        function saveTitle() {
            const newTitle = document.getElementById('editTitle').value.trim();
            if (newTitle) {
                currentModel.title = newTitle;
                document.getElementById('modelTitle').textContent = newTitle;
                saveModelData();
                alert('标题已保存');
            }
        }
        
        function saveDescription() {
            const newDescription = document.getElementById('editDescription').value.trim();
            if (newDescription) {
                currentModel.description = newDescription;
                document.getElementById('modelDescription').innerHTML = newDescription.replace(/\n/g, '<br>');
                saveModelData();
                alert('说明已保存');
            }
        }
        
        function saveModelData() {
            const models = JSON.parse(localStorage.getItem('models') || '[]');
            const index = models.findIndex(m => m.id === modelId);
            if (index !== -1) {
                models[index] = currentModel;
                localStorage.setItem('models', JSON.stringify(models));
            }
        }
        
        function jumpToCourse() {
            const sequence = getModelSequence();
            const courses = JSON.parse(localStorage.getItem('courses') || '[]');
            if (courses.length > sequence && courses[sequence]) {
                window.open(`course-detail.html?id=${courses[sequence].id}`, '_blank');
            } else {
                alert('对应的微课不存在');
            }
        }
        
        function jumpToPractice() {
            const sequence = getModelSequence();
            const practices = JSON.parse(localStorage.getItem('practices') || '[]');
            if (practices.length > sequence && practices[sequence]) {
                window.open(`practice-detail.html?id=${practices[sequence].id}`, '_blank');
            } else {
                alert('对应的闯关练习不存在');
            }
        }
        
        function jumpToStory() {
            const sequence = getModelSequence();
            const stories = JSON.parse(localStorage.getItem('stories') || '[]');
            if (stories.length > sequence && stories[sequence]) {
                window.open(`story-detail.html?id=${stories[sequence].id}`, '_blank');
            } else {
                alert('对应的故事不存在');
            }
        }
        
        function deleteModel() {
            if (confirm('确定要删除这个模型吗？删除后将无法恢复！')) {
                let models = JSON.parse(localStorage.getItem('models') || '[]');
                models = models.filter(m => m.id !== modelId);
                localStorage.setItem('models', JSON.stringify(models));
                alert('模型已删除');
                window.close();
            }
        }
    </script>
</body>
</html>
