<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 - 天工开物·国风理科学习站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'earth-brown': '#8B4513',
                        'bamboo-green': '#8FBC8F',
                        'light-gray': '#F5F5F5',
                        'dark-gray': '#333333',
                        'cream': '#f5f5dc',
                    },
                    fontFamily: {
                        'chinese': ['SimSun', 'STSong', 'serif'],
                    },
                },
            }
        }
    </script>
    <style>
        body {
            background: linear-gradient(135deg, #f5f5dc 0%, #e8d4b8 100%);
            min-height: 100vh;
        }
        
        .section-card {
            background: white;
            border: 2px solid #D2B48C;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(139, 69, 19, 0.2);
            transition: all 0.3s ease;
            cursor: pointer;
            overflow: hidden;
        }
        
        .section-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 30px rgba(139, 69, 19, 0.4);
            border-color: #8B4513;
        }
        
        .section-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 16px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #8B4513 0%, #A0522D 100%);
            color: #f5f5dc;
            border: 2px solid #654321;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 69, 19, 0.6);
        }
        
        .btn-danger {
            background: #dc3545;
            color: white;
            border: 2px solid #a71d2a;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        
        .btn-danger:hover {
            background: #c82333;
        }
        
        .nav-link {
            color: #654321;
            transition: all 0.3s ease;
        }
        
        .nav-link:hover {
            color: #8B4513;
        }
        
        .edit-mode .editable {
            border: 2px dashed #8B4513;
            padding: 4px;
            background: rgba(139, 69, 19, 0.05);
            cursor: text;
        }
        
        .edit-mode .edit-controls {
            display: block;
        }
        
        .edit-controls {
            display: none;
        }
        
        .hero-section {
            background: white;
            border: 2px solid #D2B48C;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(139, 69, 19, 0.2);
            padding: 40px;
            margin-bottom: 40px;
        }
        
        .hero-image {
            width: 100%;
            max-width: 600px;
            height: 300px;
            object-fit: cover;
            border-radius: 8px;
            margin: 20px auto;
        }
    </style>
</head>
<body>
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center">
                    <h1 class="text-2xl font-bold text-earth-brown editable" style="font-family: 'SimSun', 'STSong', serif;">天工开物</h1>
                    <span class="ml-2 text-gray-600 editable">国风理科学习站</span>
                </div>
                <div class="flex items-center space-x-4">
                    <button id="editModeToggle" class="btn-primary px-4 py-2 font-medium">
                        <i class="fa fa-pencil mr-2"></i>编辑模式
                    </button>
                    <span class="text-gray-600" id="welcomeUser">欢迎，<span id="username"></span></span>
                    <button onclick="logout()" class="text-earth-brown hover:text-bamboo-green transition-colors">
                        <i class="fa fa-sign-out mr-1"></i>退出
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-12">
        <div class="hero-section text-center mb-12">
            <div class="edit-controls mb-4">
                <label class="btn-primary px-4 py-2 text-sm cursor-pointer">
                    <i class="fa fa-upload mr-1"></i>上传封面图片
                    <input type="file" id="heroImageUpload" accept="image/*" class="hidden">
                </label>
            </div>
            <img id="heroImage" src="https://trae-api-cn.mchost.guru/api/ide/v1/text_to_image?prompt=Ancient%20Chinese%20technology%20education%2C%20traditional%20style&image_size=landscape_16_9" alt="首页封面" class="hero-image">
            <h2 class="text-4xl font-bold text-earth-brown mb-4 editable" style="font-family: 'SimSun', 'STSong', serif;">
                欢迎来到天工开物
            </h2>
            <p class="text-gray-600 text-lg editable">融合中国古代科技与现代理科教育</p>
            <div class="edit-controls mt-4">
                <input type="text" id="editHeroTitle" class="w-full border border-gray-300 rounded-md px-3 py-2 mb-2" placeholder="编辑标题">
                <input type="text" id="editHeroSubtitle" class="w-full border border-gray-300 rounded-md px-3 py-2 mb-2" placeholder="编辑副标题">
                <button onclick="saveHeroContent()" class="btn-primary px-4 py-2">保存内容</button>
            </div>
            <div class="w-32 h-1 bg-earth-brown mx-auto mt-4"></div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-6xl mx-auto">
            <div class="section-card p-8 text-center" onclick="window.open('courses.html', '_blank')">
                <div class="section-icon bg-earth-brown">
                    <i class="fa fa-video-camera text-white text-4xl"></i>
                </div>
                <h3 class="text-2xl font-bold text-earth-brown mb-3">微课库</h3>
                <p class="text-gray-600 mb-4">精选理科微课视频，生动有趣，易于理解</p>
                <button class="btn-primary px-6 py-2 font-medium">
                    进入学习 <i class="fa fa-arrow-right ml-2"></i>
                </button>
            </div>

            <div class="section-card p-8 text-center" onclick="window.open('3d-lab.html', '_blank')">
                <div class="section-icon bg-bamboo-green">
                    <i class="fa fa-cube text-white text-4xl"></i>
                </div>
                <h3 class="text-2xl font-bold text-earth-brown mb-3">3D交互</h3>
                <p class="text-gray-600 mb-4">古代科技3D模型，沉浸式学习体验</p>
                <button class="btn-primary px-6 py-2 font-medium">
                    开始探索 <i class="fa fa-arrow-right ml-2"></i>
                </button>
            </div>

            <div class="section-card p-8 text-center" onclick="window.open('practice.html', '_blank')">
                <div class="section-icon bg-earth-brown">
                    <i class="fa fa-gamepad text-white text-4xl"></i>
                </div>
                <h3 class="text-2xl font-bold text-earth-brown mb-3">闯关练习</h3>
                <p class="text-gray-600 mb-4">趣味闯关游戏，巩固知识点</p>
                <button class="btn-primary px-6 py-2 font-medium">
                    挑战自我 <i class="fa fa-arrow-right ml-2"></i>
                </button>
            </div>

            <div class="section-card p-8 text-center" onclick="window.open('stories.html', '_blank')">
                <div class="section-icon bg-bamboo-green">
                    <i class="fa fa-book text-white text-4xl"></i>
                </div>
                <h3 class="text-2xl font-bold text-earth-brown mb-3">故事集锦</h3>
                <p class="text-gray-600 mb-4">古代科学家故事，传承科学精神</p>
                <button class="btn-primary px-6 py-2 font-medium">
                    阅读故事 <i class="fa fa-arrow-right ml-2"></i>
                </button>
            </div>

            <div class="section-card p-8 text-center" onclick="window.open('works.html', '_blank')">
                <div class="section-icon bg-earth-brown">
                    <i class="fa fa-palette text-white text-4xl"></i>
                </div>
                <h3 class="text-2xl font-bold text-earth-brown mb-3">作品展示</h3>
                <p class="text-gray-600 mb-4">学生优秀作品，激发创作灵感</p>
                <button class="btn-primary px-6 py-2 font-medium">
                    欣赏作品 <i class="fa fa-arrow-right ml-2"></i>
                </button>
            </div>

            <div class="section-card p-8 text-center" onclick="window.open('https://doubao.com', '_blank')">
                <div class="section-icon bg-bamboo-green">
                    <i class="fa fa-robot text-white text-4xl"></i>
                </div>
                <h3 class="text-2xl font-bold text-earth-brown mb-3">AI助手</h3>
                <p class="text-gray-600 mb-4">智能AI助手，解答学习疑问</p>
                <button class="btn-primary px-6 py-2 font-medium">
                    开始对话 <i class="fa fa-arrow-right ml-2"></i>
                </button>
            </div>
        </div>
    </main>

    <footer class="bg-dark-gray text-white py-8 mt-12">
        <div class="container mx-auto px-4 text-center">
            <p class="text-gray-400 editable">© 2026 天工开物·国风理科学习站 版权所有</p>
            <div class="edit-controls mt-2">
                <input type="text" id="editFooterText" class="w-full border border-gray-300 rounded-md px-3 py-2" placeholder="编辑页脚文字">
                <button onclick="saveFooterText()" class="btn-primary px-4 py-2 mt-2">保存页脚</button>
            </div>
        </div>
    </footer>

    <script>
        const API_BASE_URL = 'http://localhost:3000';
        
        let editMode = false;
        
        window.addEventListener('load', function() {
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            const username = localStorage.getItem('username');
            
            if (isLoggedIn !== 'true') {
                window.location.href = 'login.html';
            } else {
                document.getElementById('username').textContent = username || '用户';
            }
            
            loadHeroContent();
        });
        
        function logout() {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('username');
            window.location.href = 'login.html';
        }
        
        document.getElementById('editModeToggle').addEventListener('click', function() {
            editMode = !editMode;
            const body = document.body;
            
            if (editMode) {
                body.classList.add('edit-mode');
                this.innerHTML = '<i class="fa fa-eye mr-2"></i>预览模式';
            } else {
                body.classList.remove('edit-mode');
                this.innerHTML = '<i class="fa fa-pencil mr-2"></i>编辑模式';
            }
        });
        
        function loadHeroContent() {
            const heroImage = localStorage.getItem('heroImage');
            const heroTitle = localStorage.getItem('heroTitle');
            const heroSubtitle = localStorage.getItem('heroSubtitle');
            const footerText = localStorage.getItem('footerText');
            
            if (heroImage) {
                document.getElementById('heroImage').src = heroImage;
            }
            if (heroTitle) {
                document.querySelector('.hero-section h2').textContent = heroTitle;
                document.getElementById('editHeroTitle').value = heroTitle;
            }
            if (heroSubtitle) {
                document.querySelector('.hero-section p').textContent = heroSubtitle;
                document.getElementById('editHeroSubtitle').value = heroSubtitle;
            }
            if (footerText) {
                document.querySelector('footer p').textContent = footerText;
                document.getElementById('editFooterText').value = footerText;
            }
        }
        
        document.getElementById('heroImageUpload').addEventListener('change', async function(e) {
            const file = e.target.files[0];
            if (file) {
                try {
                    const formData = new FormData();
                    formData.append('image', file);
                    
                    const response = await fetch(`${API_BASE_URL}/upload-image`, {
                        method: 'POST',
                        body: formData
                    });
                    
                    const result = await response.json();
                    
                    if (result.success) {
                        const imageUrl = `http://localhost:3000/uploads/${result.file.filename}`;
                        document.getElementById('heroImage').src = imageUrl;
                        localStorage.setItem('heroImage', imageUrl);
                        localStorage.setItem('heroImageFilename', result.file.filename);
                        alert('封面图片已上传到服务器');
                    } else {
                        throw new Error(result.error || '上传失败');
                    }
                } catch (error) {
                    console.error('上传封面失败:', error);
                    alert('上传封面失败: ' + error.message + '\n请确保服务器已启动（npm start）');
                }
            }
        });
        
        function saveHeroContent() {
            const newTitle = document.getElementById('editHeroTitle').value.trim();
            const newSubtitle = document.getElementById('editHeroSubtitle').value.trim();
            
            if (newTitle) {
                document.querySelector('.hero-section h2').textContent = newTitle;
                localStorage.setItem('heroTitle', newTitle);
            }
            
            if (newSubtitle) {
                document.querySelector('.hero-section p').textContent = newSubtitle;
                localStorage.setItem('heroSubtitle', newSubtitle);
            }
            
            alert('内容已保存');
        }
        
        function saveFooterText() {
            const newText = document.getElementById('editFooterText').value.trim();
            if (newText) {
                document.querySelector('footer p').textContent = newText;
                localStorage.setItem('footerText', newText);
                alert('页脚已保存');
            }
        }
    </script>
</body>
</html>
