<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>作品详情 - 天工开物·国风理科学习站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'earth-brown': '#8B4513',
                        'bamboo-green': '#8FBC8F',
                        'light-gray': '#F5F5F5',
                        'dark-gray': '#333333',
                        'cream': '#f5f5dc',
                    },
                    fontFamily: {
                        'chinese': ['SimSun', 'STSong', 'serif'],
                    },
                },
            }
        }
    </script>
    <style>
        body {
            background: linear-gradient(135deg, #f5f5dc 0%, #e8d4b8 100%);
            min-height: 100vh;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #8B4513 0%, #A0522D 100%);
            color: #f5f5dc;
            border: 2px solid #654321;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139, 69, 19, 0.6);
        }
        
        .btn-danger {
            background: #dc3545;
            color: white;
            border: 2px solid #a71d2a;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        
        .btn-danger:hover {
            background: #c82333;
        }
        
        .edit-mode .editable {
            border: 2px dashed #8B4513;
            padding: 8px;
            background: rgba(139, 69, 19, 0.05);
        }
        
        .edit-mode .edit-controls {
            display: block;
        }
        
        .edit-controls {
            display: none;
        }
        
        .content-card {
            background: white;
            border: 2px solid #D2B48C;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(139, 69, 19, 0.2);
        }
    </style>
</head>
<body>
    <nav class="bg-white shadow-md sticky top-0 z-50">
        <div class="container mx-auto px-4 py-4">
            <div class="flex justify-between items-center">
                <div class="flex items-center">
                    <a href="index.html" class="text-2xl font-bold text-earth-brown hover:text-bamboo-green transition-colors" style="font-family: 'SimSun', 'STSong', serif;">天工开物</a>
                    <span class="ml-2 text-gray-600">作品详情</span>
                </div>
                <div class="flex items-center space-x-4">
                    <button id="editModeToggle" class="btn-primary px-4 py-2 font-medium">
                        <i class="fa fa-pencil mr-2"></i>编辑模式
                    </button>
                    <a href="works.html" class="text-earth-brown hover:text-bamboo-green transition-colors">
                        <i class="fa fa-arrow-left mr-1"></i>返回
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="container mx-auto px-4 py-8">
        <div class="max-w-4xl mx-auto">
            <div class="mb-6">
                <h1 class="text-3xl font-bold text-earth-brown mb-2 editable" id="workTitle"></h1>
                <p class="text-gray-500 mb-2 editable" id="workAuthor"></p>
                <div class="edit-controls">
                    <input type="text" id="editTitle" class="w-full border border-gray-300 rounded-md px-3 py-2 mb-2" placeholder="编辑标题">
                    <input type="text" id="editAuthor" class="w-full border border-gray-300 rounded-md px-3 py-2 mb-2" placeholder="编辑作者">
                    <button onclick="saveTitle()" class="btn-primary px-4 py-2 text-sm">保存</button>
                </div>
            </div>

            <div class="content-card p-6 mb-6">
                <div class="mb-6">
                    <img id="workImage" src="" alt="作品图片" class="w-full h-96 object-cover rounded-lg">
                    <div class="edit-controls mt-4">
                        <label class="btn-primary px-4 py-2 text-sm cursor-pointer">
                            <i class="fa fa-upload mr-1"></i>上传图片
                            <input type="file" id="imageUpload" accept="image/*" class="hidden">
                        </label>
                    </div>
                </div>
                
                <h2 class="text-2xl font-bold text-earth-brown mb-4">作品描述</h2>
                <div class="editable text-gray-700" id="workDescription"></div>
                <div class="edit-controls mt-4">
                    <textarea id="editDescription" class="w-full border border-gray-300 rounded-md px-3 py-2" rows="6" placeholder="编辑作品描述"></textarea>
                    <button onclick="saveDescription()" class="btn-primary px-4 py-2 mt-2">保存描述</button>
                </div>
            </div>

            <div class="content-card p-6">
                <h2 class="text-2xl font-bold text-earth-brown mb-4">相关学习</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <button onclick="window.open(`course-detail.html?id=${getWorkId()}`, '_blank')" class="btn-primary py-4 px-6 text-center">
                        <i class="fa fa-video-camera text-2xl mb-2 block"></i>
                        <span class="font-medium">微课学习</span>
                    </button>
                    <button onclick="window.open(`3d-detail.html?id=${getWorkId()}`, '_blank')" class="btn-primary py-4 px-6 text-center">
                        <i class="fa fa-cube text-2xl mb-2 block"></i>
                        <span class="font-medium">3D交互</span>
                    </button>
                    <button onclick="window.open(`practice-detail.html?id=${getWorkId()}`, '_blank')" class="btn-primary py-4 px-6 text-center">
                        <i class="fa fa-gamepad text-2xl mb-2 block"></i>
                        <span class="font-medium">闯关练习</span>
                    </button>
                </div>
            </div>

            <div class="edit-controls mt-6">
                <button onclick="deleteWork()" class="btn-danger px-6 py-3 w-full">
                    <i class="fa fa-trash mr-2"></i>删除此作品
                </button>
            </div>
        </div>
    </main>

    <footer class="bg-dark-gray text-white py-8 mt-12">
        <div class="container mx-auto px-4 text-center">
            <p class="text-gray-400">© 2026 天工开物·国风理科学习站 版权所有</p>
        </div>
    </footer>

    <script>
        let editMode = false;
        let currentWork = null;
        let workId = null;
        
        window.addEventListener('load', function() {
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            if (isLoggedIn !== 'true') {
                window.location.href = 'login.html';
                return;
            }
            
            workId = getWorkId();
            loadWork();
        });
        
        function getWorkId() {
            const urlParams = new URLSearchParams(window.location.search);
            return parseInt(urlParams.get('id'));
        }
        
        function loadWork() {
            const works = JSON.parse(localStorage.getItem('works') || '[]');
            currentWork = works.find(w => w.id === workId);
            
            if (!currentWork) {
                alert('作品不存在');
                window.location.href = 'works.html';
                return;
            }
            
            document.getElementById('workTitle').textContent = currentWork.title;
            document.getElementById('editTitle').value = currentWork.title;
            document.getElementById('workAuthor').textContent = '作者：' + currentWork.author;
            document.getElementById('editAuthor').value = currentWork.author;
            document.getElementById('workImage').src = currentWork.image;
            document.getElementById('workDescription').innerHTML = currentWork.description.replace(/\n/g, '<br>');
            document.getElementById('editDescription').value = currentWork.description;
        }
        
        document.getElementById('editModeToggle').addEventListener('click', function() {
            editMode = !editMode;
            const body = document.body;
            
            if (editMode) {
                body.classList.add('edit-mode');
                this.innerHTML = '<i class="fa fa-eye mr-2"></i>预览模式';
            } else {
                body.classList.remove('edit-mode');
                this.innerHTML = '<i class="fa fa-pencil mr-2"></i>编辑模式';
            }
        });
        
        document.getElementById('imageUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('workImage').src = event.target.result;
                    currentWork.image = event.target.result;
                    saveWork();
                };
                reader.readAsDataURL(file);
            }
        });
        
        function saveTitle() {
            const newTitle = document.getElementById('editTitle').value.trim();
            const newAuthor = document.getElementById('editAuthor').value.trim();
            
            if (newTitle) {
                currentWork.title = newTitle;
                document.getElementById('workTitle').textContent = newTitle;
            }
            
            if (newAuthor) {
                currentWork.author = newAuthor;
                document.getElementById('workAuthor').textContent = '作者：' + newAuthor;
            }
            
            saveWork();
            alert('已保存');
        }
        
        function saveDescription() {
            const newDescription = document.getElementById('editDescription').value.trim();
            if (newDescription) {
                currentWork.description = newDescription;
                document.getElementById('workDescription').innerHTML = newDescription.replace(/\n/g, '<br>');
                saveWork();
                alert('描述已保存');
            }
        }
        
        function saveWork() {
            const works = JSON.parse(localStorage.getItem('works') || '[]');
            const index = works.findIndex(w => w.id === workId);
            if (index !== -1) {
                works[index] = currentWork;
                localStorage.setItem('works', JSON.stringify(works));
            }
        }
        
        function deleteWork() {
            if (confirm('确定要删除这个作品吗？删除后将无法恢复！')) {
                let works = JSON.parse(localStorage.getItem('works') || '[]');
                works = works.filter(w => w.id !== workId);
                localStorage.setItem('works', JSON.stringify(works));
                alert('作品已删除');
                window.close();
            }
        }
    </script>
</body>
</html>
