<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STL文件测试</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #f5f5dc;
        }
        .test-section {
            background: white;
            border: 2px solid #8B4513;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        button {
            background: #8B4513;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 10px 5px;
        }
        button:hover {
            background: #A0522D;
        }
        #log {
            background: #333;
            color: #0f0;
            padding: 15px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
        }
        .log-entry {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #8FBC8F;
            padding-left: 10px;
        }
        .success { color: #8FBC8F; }
        .error { color: #dc3545; }
        .info { color: #17a2b8; }
    </style>
</head>
<body>
    <h1>STL文件加载测试</h1>
    
    <div class="test-section">
        <h2>测试1: 文件选择器</h2>
        <input type="file" id="fileInput" accept=".stl">
        <button onclick="testFileInput()">测试文件选择器</button>
        
        <h2>测试2: 路径输入</h2>
        <input type="text" id="pathInput" placeholder="输入STL文件路径（如：./model.stl）" style="width: 300px; padding: 10px;">
        <button onclick="testPathInput()">测试路径输入</button>
        
        <h2>测试3: 直接加载</h2>
        <button onclick="testDirectLoad()">直接加载示例</button>
    </div>
    
    <div id="log"></div>

    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/STLLoader.js"></script>
    
    <script>
        const logDiv = document.getElementById('log');
        
        function addLog(message, type = 'info') {
            const entry = document.createElement('div');
            entry.className = `log-entry ${type}`;
            const time = new Date().toLocaleTimeString();
            entry.textContent = `[${time}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message);
        }
        
        function testFileInput() {
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            
            if (!file) {
                addLog('请先选择一个STL文件', 'error');
                return;
            }
            
            addLog(`开始加载文件: ${file.name}`, 'info');
            
            const reader = new FileReader();
            reader.onload = function(e) {
                addLog(`文件读取成功，大小: ${e.target.result.byteLength} bytes`, 'success');
                
                try {
                    const loader = new THREE.STLLoader();
                    const geometry = loader.parse(e.target.result);
                    addLog(`STL解析成功，顶点数: ${geometry.attributes.position.count}`, 'success');
                } catch (error) {
                    addLog(`STL解析失败: ${error.message}`, 'error');
                }
            };
            
            reader.onerror = function() {
                addLog('文件读取失败', 'error');
            };
            
            reader.readAsArrayBuffer(file);
        }
        
        function testPathInput() {
            const path = document.getElementById('pathInput').value.trim();
            
            if (!path) {
                addLog('请输入文件路径', 'error');
                return;
            }
            
            addLog(`尝试加载路径: ${path}`, 'info');
            
            fetch(path)
                .then(response => {
                    addLog(`HTTP响应状态: ${response.status} ${response.statusText}`, 'info');
                    
                    if (!response.ok) {
                        throw new Error(`HTTP ${response.status}`);
                    }
                    
                    return response.arrayBuffer();
                })
                .then(data => {
                    addLog(`文件获取成功，大小: ${data.byteLength} bytes`, 'success');
                    
                    try {
                        const loader = new THREE.STLLoader();
                        const geometry = loader.parse(data);
                        addLog(`STL解析成功，顶点数: ${geometry.attributes.position.count}`, 'success');
                    } catch (error) {
                        addLog(`STL解析失败: ${error.message}`, 'error');
                    }
                })
                .catch(error => {
                    addLog(`加载失败: ${error.message}`, 'error');
                    addLog('提示: 浏览器可能不允许直接加载本地文件', 'info');
                });
        }
        
        function testDirectLoad() {
            addLog('创建测试场景...', 'info');
            
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer();
            renderer.setSize(window.innerWidth / 2, window.innerHeight / 2);
            document.body.appendChild(renderer.domElement);
            
            const geometry = new THREE.BoxGeometry(1, 1, 1);
            const material = new THREE.MeshBasicMaterial({ color: 0x8B4513 });
            const cube = new THREE.Mesh(geometry, material);
            scene.add(cube);
            
            camera.position.z = 2;
            renderer.render(scene, camera);
            
            addLog('测试场景创建成功', 'success');
        }
        
        addLog('页面已加载，请选择测试方式', 'info');
    </script>
</body>
</html>
